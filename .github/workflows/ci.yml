name: CI

# GitHub Actions disabled — billing credits exhausted.
# All checks run locally via git pre-push hook (.git/hooks/pre-push).
# Re-enable by restoring the on: push/pull_request triggers.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false

jobs:
  validate-linux:
    name: Validate (Linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Package integrity
        run: npm pack --dry-run

  validate-macos:
    name: Validate (macOS)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Package integrity
        run: npm pack --dry-run
