name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Smoke + Tests (${{ matrix.os }} / Node 20)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # windows-latest: disabled until test suite path handling is
          # cross-platform. Windows installs use WSL2 (see INSTALL-WINDOWS.md).

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke verification
        run: npm run verify:smoke

      - name: Test suite
        run: node test.js
        env:
          SCHEDULER_DB: ':memory:'
